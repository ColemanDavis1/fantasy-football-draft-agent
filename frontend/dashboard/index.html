<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draft Agent — Live Board</title>
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --txt:#e7eaf0; --dim:#9aa3b2; --me:#f5b301; --live:#3ddc84;
    --qb:#e0567a; --rb:#3ddc84; --wr:#4aa8ff; --te:#f0883e; --k:#b07cff; --def:#8a93a3;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
    font:14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  a { color:inherit; }
  header { position:sticky; top:0; z-index:5; background:var(--panel);
    border-bottom:1px solid var(--line); padding:10px 16px;
    display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.2px; }
  .meta { color:var(--dim); font-size:12px; }
  .pill { padding:2px 9px; border-radius:999px; font-size:12px; font-weight:600;
    background:var(--panel2); border:1px solid var(--line); white-space:nowrap; }
  .pill.live { background:rgba(61,220,132,.15); color:var(--live); border-color:transparent; }
  .pill.warn { background:rgba(245,179,1,.16); color:var(--me); border-color:transparent; }
  .pill.bad  { background:rgba(224,86,122,.18); color:#ff7b9c; border-color:transparent; }
  .spacer { flex:1; }
  .runs { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .layout { display:grid; grid-template-columns:360px 1fr; gap:14px; padding:14px; align-items:start; }
  @media (max-width:900px){ .layout{ grid-template-columns:1fr; } }

  /* recommendation panel */
  .rec { position:sticky; top:58px; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:14px; }
  .rec.myturn { border-color:var(--me); box-shadow:0 0 0 1px var(--me),0 0 24px rgba(245,179,1,.15); }
  .rec h2 { margin:0 0 2px; font-size:13px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); }
  .rec .turn { font-size:13px; margin-bottom:10px; }
  .primary { background:var(--panel2); border-radius:10px; padding:12px; margin-bottom:10px; }
  .primary .nm { font-size:20px; font-weight:700; }
  .primary .sub { color:var(--dim); font-size:12px; margin-top:2px; }
  .sig { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .sig span { font-size:11px; background:#10131a; border:1px solid var(--line);
    border-radius:6px; padding:2px 6px; color:var(--dim); }
  .sig b { color:var(--txt); }
  table { width:100%; border-collapse:collapse; margin-top:4px; }
  th,td { text-align:left; padding:5px 6px; font-size:12px; border-bottom:1px solid var(--line); }
  th { color:var(--dim); font-weight:600; }
  td.r,th.r { text-align:right; }
  .rationale { margin-top:10px; font-size:12.5px; color:#cfd6e2; background:#10131a;
    border-radius:8px; padding:9px 10px; border:1px solid var(--line); }
  .rationale.ai { border-color:#2d6cdf; }
  button { font:inherit; font-size:12px; background:var(--panel2); color:var(--txt);
    border:1px solid var(--line); border-radius:7px; padding:6px 10px; cursor:pointer; }
  button:hover { border-color:#3a4250; }
  button:disabled { opacity:.5; cursor:default; }

  /* team grid */
  .teams { display:grid; grid-template-columns:repeat(auto-fill,minmax(255px,1fr)); gap:10px; }
  .team { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 11px; }
  .team.me { border-color:var(--me); }
  .team.live { border-color:var(--live); box-shadow:0 0 14px rgba(61,220,132,.12); }
  .team .top { display:flex; align-items:baseline; gap:8px; }
  .team .nm { font-weight:650; font-size:13.5px; }
  .team .own { color:var(--dim); font-size:11px; }
  .tags { display:flex; flex-wrap:wrap; gap:5px; margin:7px 0; }
  .tag { font-size:10.5px; padding:2px 6px; border-radius:5px; background:var(--panel2);
    border:1px solid var(--line); color:var(--dim); }
  .tag.arch { color:#cdd5e2; }
  .tag.reach { color:#ff9c6e; } .tag.value { color:#6ee7a8; }
  .needs { display:flex; flex-wrap:wrap; gap:4px; margin:4px 0 8px; }
  .need { font-size:10.5px; padding:2px 6px; border-radius:5px; font-weight:600;
    background:rgba(74,168,255,.14); color:#9ecbff; }
  .roster { display:flex; flex-direction:column; gap:2px; }
  .pl { display:flex; align-items:center; gap:7px; font-size:12px; }
  .pos { width:30px; text-align:center; font-size:10px; font-weight:700; border-radius:4px;
    padding:1px 0; color:#0f1115; }
  .pos.QB{background:var(--qb)} .pos.RB{background:var(--rb)} .pos.WR{background:var(--wr)}
  .pos.TE{background:var(--te)} .pos.K{background:var(--k)} .pos.DEF{background:var(--def)}
  .pl .b { color:var(--dim); font-size:10px; margin-left:auto; }
  .empty { color:var(--dim); font-size:11px; font-style:italic; }
  .note { color:var(--dim); font-size:10.5px; margin-top:6px; }
  #err { display:none; background:var(--bad,#3a1822); color:#ff7b9c; padding:8px 16px;
    border-bottom:1px solid #5a2230; font-size:12.5px; }
  #err.show { display:block; }
</style>
</head>
<body>
<header>
  <h1>🏈 Draft Agent</h1>
  <span class="pill" id="league">connecting…</span>
  <span class="pill" id="pick">—</span>
  <span class="pill" id="clock">—</span>
  <div class="runs" id="runs"></div>
  <span class="spacer"></span>
  <span class="pill" id="sync">sync —</span>
  <span class="meta" id="updated"></span>
</header>
<div id="err"></div>

<div class="layout">
  <aside>
    <div class="rec" id="rec">
      <h2>Your pick</h2>
      <div class="turn" id="turn">Waiting for draft data…</div>
      <div id="primary"></div>
      <div id="shortlist"></div>
      <div class="rationale" id="engineRat"></div>
      <div style="margin-top:10px; display:flex; gap:8px; align-items:center;">
        <button id="aiBtn">Get AI reasoning (Opus 4.8)</button>
        <span class="meta" id="aiState"></span>
      </div>
      <div class="rationale ai" id="aiRat" style="display:none"></div>
    </div>
  </aside>
  <main>
    <div class="teams" id="teams"></div>
  </main>
</div>

<script>
const POLL_MS = 2500;
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let lastState = null;

async function getJSON(url){
  const r = await fetch(url, {cache:'no-store'});
  if(!r.ok) throw new Error(url+' -> '+r.status);
  return r.json();
}

function posTag(p){ return `<span class="pos ${esc(p)}">${esc(p)}</span>`; }

function renderHeader(s){
  $('league').textContent = `${s.scoring_type||'?'}${s.is_superflex?' · superflex':''} · ${s.num_teams} teams`;
  $('pick').textContent = `Pick ${s.current_overall} · Rd ${s.current_round}`;
  const oc = (s.teams||[]).find(t=>t.team_id===s.on_the_clock);
  const ocName = oc ? oc.name : (s.on_the_clock!=null?('Team '+s.on_the_clock):'—');
  const clock = $('clock');
  clock.textContent = `On the clock: ${ocName}${s.is_my_turn?' (YOU)':''}`;
  clock.className = 'pill ' + (s.is_my_turn?'warn':'live');
  const runs = $('runs');
  const entries = Object.entries(s.active_runs||{});
  runs.innerHTML = entries.length
    ? '<span class="meta">runs:</span>' + entries.map(([p,c])=>`<span class="pill bad">${esc(p)} ×${c}</span>`).join('')
    : '';
}

function renderSync(sync){
  const el = $('sync');
  if(!sync){ el.textContent='sync —'; el.className='pill'; return; }
  if(sync.in_sync){ el.textContent=`in sync · ${sync.picks_recorded} picks`; el.className='pill live'; }
  else { el.textContent=`⚠ ${ (sync.missing_overalls||[]).length } missing`; el.className='pill bad'; }
}

function renderRec(rec){
  const my = !!rec.is_my_turn;
  $('rec').className = 'rec' + (my?' myturn':'');
  if(my) $('turn').innerHTML = `<b style="color:var(--me)">YOU are on the clock</b> — pick ${rec.current_overall}.`;
  else $('turn').innerHTML = `Your next pick: <b>${rec.my_next_overall??'?'}</b> (${rec.picks_until_next??'?'} away). Pre-computing.`;

  const p = rec.primary;
  $('primary').innerHTML = p ? `
    <div class="primary">
      <div class="nm">${posTag(p.position)} ${esc(p.name)} <span class="sub">${esc(p.team||'FA')}${p.bye?' · bye '+p.bye:''}</span></div>
      <div class="sig">
        <span>VORP <b>${Math.round(p.vorp)}</b></span>
        <span>tier <b>${p.tier}</b> (${p.players_left_in_tier} left)</span>
        <span>P(back) <b>${Math.round((p.p_available_next||0)*100)}%</b></span>
        <span>score <b>${Math.round(p.pick_score)}</b></span>
        ${p.run_active?`<span>⚠ ${esc(p.position)} run (${p.run_count})</span>`:''}
        ${p.fills_need?`<span>fills a starter</span>`:''}
      </div>
    </div>` : '<div class="empty">No candidate yet.</div>';

  const sl = rec.shortlist||[];
  $('shortlist').innerHTML = sl.length ? `
    <table><thead><tr>
      <th>Player</th><th>Pos</th><th class="r">VORP</th><th class="r">Tier</th><th class="r">P(back)</th>
    </tr></thead><tbody>
    ${sl.map(c=>`<tr>
      <td>${esc(c.name)} <span class="meta">${esc(c.team||'')}</span></td>
      <td>${posTag(c.position)}</td>
      <td class="r">${Math.round(c.vorp)}</td>
      <td class="r">${c.tier}</td>
      <td class="r">${Math.round((c.p_available_next||0)*100)}%</td>
    </tr>`).join('')}
    </tbody></table>` : '';

  $('engineRat').textContent = rec.engine_rationale || '';
  $('aiBtn').disabled = !my;
  if(rec.llm && rec.llm.rationale){
    $('aiRat').style.display='block';
    $('aiRat').innerHTML = `<b>Opus 4.8:</b> ${esc(rec.llm.rationale)}`;
  }
}

function renderTeams(s){
  const slotOrder = Object.keys(s.starter_slots||{});
  const teams = (s.teams||[]).slice().sort((a,b)=>(a.draft_slot||99)-(b.draft_slot||99));
  $('teams').innerHTML = teams.map(t=>{
    const live = t.team_id===s.on_the_clock;
    const tags = [];
    let arch = t.archetype;
    if((arch==='Undeclared'||arch==='Balanced/BPA') && t.prior_archetype)
      tags.push(`<span class="tag arch">${esc(arch)} · prior ${esc(t.prior_archetype)}</span>`);
    else tags.push(`<span class="tag arch">${esc(arch)}</span>`);
    if(t.tendency==='reacher') tags.push('<span class="tag reach">reaches</span>');
    if(t.tendency==='value-waiter') tags.push('<span class="tag value">waits for value</span>');
    (t.stacks||[]).forEach(x=>tags.push(`<span class="tag">stack: ${esc(x)}</span>`));
    (t.bye_conflicts||[]).forEach(x=>tags.push(`<span class="tag">⚠ ${esc(x)}</span>`));

    const needs = Object.entries(t.needs||{}).map(([sl,c])=>`<span class="need">${esc(sl)}${c>1?'×'+c:''}</span>`).join('') || '<span class="empty">starters full</span>';
    const roster = (t.roster||[]).length
      ? t.roster.map(p=>`<div class="pl">${posTag(p.pos)}<span>${esc(p.name)}</span><span class="b">${p.team?esc(p.team):''}${p.bye?' · b'+p.bye:''}</span></div>`).join('')
      : '<div class="empty">no picks yet</div>';
    return `<div class="team ${t.is_me?'me':''} ${live?'live':''}">
      <div class="top">
        <span class="nm">${t.draft_slot?('#'+t.draft_slot+' '):''}${esc(t.name)}</span>
        ${t.is_me?'<span class="pill warn">YOU</span>':''}
        ${live?'<span class="pill live">on clock</span>':''}
      </div>
      ${t.owner?`<div class="own">${esc(t.owner)}</div>`:''}
      <div class="tags">${tags.join('')}</div>
      <div class="meta">needs:</div><div class="needs">${needs}</div>
      <div class="roster">${roster}</div>
    </div>`;
  }).join('');
}

async function tick(){
  try{
    const [state, rec] = await Promise.all([
      getJSON('/state'),
      getJSON('/recommendation?use_llm=false'),
    ]);
    lastState = state;
    $('err').className=''; $('err').textContent='';
    renderHeader(state);
    renderSync(rec.sync);
    renderRec(rec);
    renderTeams(state);
    $('updated').textContent = 'updated ' + new Date().toLocaleTimeString();
  }catch(e){
    $('err').className='show';
    $('err').textContent = 'Cannot reach the draft server — is it running? (uvicorn app.server:app --port 8000, then POST /session/reset). ' + e.message;
  }
}

// On-demand LLM reasoning (respects the ~16-calls/draft cost model — not polled).
$('aiBtn').addEventListener('click', async ()=>{
  $('aiState').textContent='thinking…'; $('aiBtn').disabled=true;
  try{
    const rec = await getJSON('/recommendation?use_llm=true');
    renderRec(rec);
    $('aiState').textContent = rec.llm ? '' : 'no LLM (set ANTHROPIC_API_KEY)';
  }catch(e){ $('aiState').textContent='error'; }
});

tick();
setInterval(tick, POLL_MS);
</script>
</body>
</html>
