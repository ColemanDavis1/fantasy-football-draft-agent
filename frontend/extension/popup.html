<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 13px/1.45 -apple-system, Segoe UI, Roboto, sans-serif; width: 280px; margin: 0; padding: 12px; background: #12151c; color: #e8edf2; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    label { display: block; margin: 8px 0 3px; color: #9aa7b4; font-size: 11px; }
    input[type=text] { width: 100%; box-sizing: border-box; padding: 5px 7px; background: #1a1f29; border: 1px solid #2a313d; border-radius: 5px; color: #e8edf2; }
    .row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
    button { background: #2a313d; color: #e8edf2; border: none; border-radius: 5px; padding: 6px 10px; cursor: pointer; }
    button.primary { background: #1db954; color: #062; font-weight: 700; }
    button:hover { filter: brightness(1.1); }
    #status { font-size: 11px; margin-top: 8px; padding: 6px; border-radius: 5px; background: #1a1f29; white-space: pre-wrap; }
    .ok { color: #1db954; } .warn { color: #f5a623; }
    fieldset { border: 1px solid #2a313d; border-radius: 6px; margin: 10px 0 0; padding: 8px; }
    legend { color: #9aa7b4; font-size: 11px; }
  </style>
</head>
<body>
  <h1>Fantasy Draft Agent</h1>

  <label>Local server URL</label>
  <input type="text" id="serverUrl" placeholder="http://localhost:8000" />

  <div class="row">
    <label style="margin:0"><input type="checkbox" id="useLlm" /> AI reasoning on my turn</label>
  </div>
  <div class="row">
    <label style="margin:0"><input type="checkbox" id="calibrate" /> Calibration logging</label>
  </div>

  <div class="row">
    <button class="primary" id="check">Check connection</button>
    <button id="reset">Reload league</button>
    <button id="refresh">Refresh pick</button>
  </div>

  <fieldset>
    <legend>Manual correction (backstop)</legend>
    <label>Overall pick #</label>
    <input type="text" id="cOverall" placeholder="e.g. 17" />
    <label>Player name</label>
    <input type="text" id="cName" placeholder="e.g. Bijan Robinson" />
    <div class="row"><button id="correct">Add / fix pick</button></div>
  </fieldset>

  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
